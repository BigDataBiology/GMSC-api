[workspace]
name = "GMSC-api"
authors = ["Luis Pedro Coelho <luis@luispedro.org>"]
channels = ["conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.9"
flask = "*"
numpy = "*"
pandas = "*"
polars = "*"
python-xz = "*"
jug = "*"
requests = "*"
pytest = "*"

[tasks]
serve = "python -m flask run"
test = "pytest test_seqinfo.py"
download-data = "jug execute download-data.py"
make-indices = "jug execute make-indices.py"
